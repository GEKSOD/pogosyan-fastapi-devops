apiVersion: apps/v1
kind: Deployment
metadata:
  name: pogosyan-fastapi
  namespace: pogosyan
  labels:
    app: pogosyan-fastapi
spec:
  replicas: 2
  selector:
    matchLabels:
      app: pogosyan-fastapi
  template:
    metadata:
      labels:
        app: pogosyan-fastapi
    spec:
      containers:
        - name: pogosyan-fastapi
          image: docker.io/geksod/pogosyan-fastapi:latest
          imagePullPolicy: Always
          env:
            - name: POGOSYAN_ENVIRONMENT
              value: kubernetes
          ports:
            - containerPort: 8000
              name: http
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
