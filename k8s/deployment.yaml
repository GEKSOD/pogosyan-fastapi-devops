apiVersion: apps/v1
kind: Deployment
metadata:
  name: sharay-fastapi
  namespace: sharay
  labels:
    app: sharay-fastapi
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sharay-fastapi
  template:
    metadata:
      labels:
        app: sharay-fastapi
    spec:
      containers:
        - name: sharay-fastapi
          image: docker.io/your-dockerhub-username/sharay-fastapi:latest
          imagePullPolicy: Always
          env:
            - name: SHARAY_ENVIRONMENT
              value: kubernetes
          ports:
            - containerPort: 8000
              name: http
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
